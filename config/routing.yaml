analyzer:
  heuristic:
    enabled: true
    tiers:
      simple:
        # Fast, lightweight models for short prompts (greetings, quick Q&A).
        thresholds: { min_tokens: 0, max_tokens: 50 }
        keywords: ["hello", "translate", "format"]
        models:
          - "lm-studio/zai-org/glm-4.7-flash"
          - "openai/gpt-4o-mini"
          - "anthropic/claude-haiku"
          - "openrouter/google/gemini-2.0-flash-001"
      medium:
        # Mid-size models for analysis, summarization, refactoring.
        thresholds: { min_tokens: 51, max_tokens: 200 }
        keywords: ["analyze", "summarize", "refactor"]
        models:
          - "lm-studio/google/gemma-4-26b-a4b-qat"
          - "openai/gpt-4o"
          - "anthropic/claude-sonnet"
          - "openrouter/anthropic/claude-3.5-sonnet"
      complex:
        # Larger models for debugging, architecture, optimization.
        thresholds: { min_tokens: 201, max_tokens: 4096 }
        keywords: ["debug", "architect", "optimize"]
        models:
          - "lm-studio/qwen/qwen3.6-35b-a3b"
          - "anthropic/claude-opus"
          - "openai/gpt-4-turbo"
          - "openrouter/meta-llama/llama-3.3-70b-instruct"
      expert:
        # Specialized models for deep reasoning, planning, simulation.
        thresholds: { min_tokens: 4097, max_tokens: null }
        keywords: ["reason", "plan", "simulate"]
        models:
          - "lm-studio/qwen/qwen3-coder-next"
          - "lm-studio/qwen/qwen3.6-35b-a3b"
          - "openrouter/anthropic/claude-3.5-sonnet"
          - "openrouter/meta-llama/llama-3.3-70b-instruct"
    fallback_policy: "sequential"
    timeout_seconds: 30
  classifier:
    enabled: false
    model: "openai/gpt-4o-mini"
    fallback_on_error: true
    timeout_seconds: 10
